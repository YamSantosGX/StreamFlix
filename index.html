<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlix</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/streamflix.css">
    <link rel="stylesheet" href="css/responsividade.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-SZC4w+Q+qoZ6m1RBG4R3w0S9Y0btp8owVvE3dr+NtuA9wCJb2HJZLcTmoMfT4sjyx9rUMoE2J5hREZOcl+lBHg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/Logo StramFlix.png">

</head>

<body style="overflow: hidden;">
    <div id="view-selection" class="view active">
    <main class="container-selecao">
        <h1>StreamFlix</h1>
        <h2>Quem está assistindo?</h2>
        <section aria-label="Perfis disponíveis">
            <!-- Perfis principais fixos (fallback caso o JavaScript esteja desabilitado) -->
            <figure><ul id="lista-perfis-dom" class="profiles">
                <li class="profile">
                    <figure>
                        <img src="assets/Perfil_1.png" alt="Perfil 1">
                        <figcaption>Perfil 1</figcaption>
                    </figure>
                </li>
                <li class="profile">
                    <figure>
                        <img src="assets/perfil_2.png" alt="Perfil 2">
                        <figcaption>Perfil 2</figcaption>
                    </figure>
                </li>
                <li class="profile">
                    <figure>
                        <img src="assets/perfil_3.png" alt="Perfil 3">
                        <figcaption>Perfil 3</figcaption>
                    </figure>
                </li>
                <li class="profile">
                    <figure>
                        <img src="assets/perfil_4.png" alt="Perfil 4">
                        <figcaption>Perfil 4</figcaption>
                    </figure>
                </li>
            </ul></figure>
            

            <!-- Ações de perfis agrupadas visualmente -->
            <div class="acoes-perfis" style="display:flex; gap:20px; justify-content:center; margin-top:20px;">
                <button class="btn-gerenciar" onclick="Sistema.abrirEdicao(null)">Adicionar Perfil</button>
                <button class="btn-gerenciar" onclick="Sistema.alternarModoEdicao()" id="btn-modo-edicao">Gerenciar Perfis</button>
            </div>
        </section>
    </main>
    </div>

    <!-- VIEW 2: GERENCIAR PERFIL -->
    <div id="view-manage" class="view">
        <div class="painel-gerenciamento">
            <h2 id="titulo-gerenciamento"
                style="border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px;">Adicionar Perfil</h2>
            <div style="display: flex; gap: 20px; align-items: center; margin-bottom: 20px;">
                <img id="preview-avatar" src="" alt="Avatar" style="width: 100px; height: 100px; border-radius: 8px;">
                <input type="text" id="input-nome-perfil" placeholder="Nome do perfil"
                    style="padding: 10px; font-size: 1.1rem; width: 100%; background: #333; color: white; border: none; border-radius: 4px;">
            </div>
            <div style="margin-bottom: 30px;">
                <p style="margin-bottom: 10px; color: var(--cor-texto-secundario);">Selecione um avatar:</p>
                <div class="opcoes-avatar" id="container-avatares"></div>
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button class="btn-gerenciar"
                    style="color: rgb(200, 0, 255); border-color: rgb(104, 16, 133); margin-right: auto;"
                    id="btn-excluir" onclick="Sistema.excluirPerfil()">Excluir</button>
                <button class="btn-gerenciar" onclick="Sistema.trocarTela('selection')">Cancelar</button>
                <button class="btn-gerenciar" style="background: white; color: black;"
                    onclick="Sistema.salvarPerfil()">Salvar</button>
            </div>
        </div>
    </div>

</body>

<script src="js/data.js"></script>
<script src="js/geminiApi.js"></script>
<script src="js/state.js"></script>
<script src="js/app.js"></script>
<script src="js/index.js"></script>

</html>
