<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlix - App</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/streamflix.css">
    <link rel="stylesheet" href="css/responsividade.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-SZC4w+Q+qoZ6m1RBG4R3w0S9Y0btp8owVvE3dr+NtuA9wCJb2HJZLcTmoMfT4sjyx9rUMoE2J5hREZOcl+lBHg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/Logo StramFlix.png">
</head>

<body>
    <div id="view-browse" class="view active">
        <header class="header-streamflix" id="navbar">
            <div class="logo-streamflix" onclick="Sistema.fazerLogout()">STREAMFLIX</div>
            <button id="btn-menu-hamburger" class="btn-menu-hamburger" onclick="Sistema.toggleMenu()" aria-label="Abrir menu">☰</button>
            <ul class="menu-navegacao" id="nav-abas">
                <li><a class="ativo" onclick="Sistema.mudarAba('inicio', this)">Início</a></li>
                <li><a onclick="Sistema.mudarAba('series', this)">Séries</a></li>
                <li><a onclick="Sistema.mudarAba('filmes', this)">Filmes</a></li>
                <li><a onclick="Sistema.mudarAba('minha_lista', this)">Minha lista</a></li>
            </ul>
            <div class="area-direita-nav">
                <div class="busca-ia">
                    <input type="text" id="input-busca-ia" placeholder="Busque um tipo de filme...">
                    <button onclick="IA.buscarRecomendacoes()" title="Recomendação Inteligente">✨</button>
                </div>
                <div class="perfil-ativo-nav" onclick="Sistema.fazerLogout()" title="Trocar de Perfil">
                    <img id="avatar-nav-ativo" src="" alt="Usuário Atual">
                </div>
            </div>
        </header>

        <main class="filme-principal" id="banner-principal"
            style="--bg-dinamico: url('https://static.crunchyroll.com/cr-acquisition/assets/img/start/hero/brazil-latam/background-desktop@2x.webp');">
            <div class="conteudo-principal">
                <h1 class="titulo-filme" id="banner-titulo">Cyberpunk 2077</h1>
                <p class="descricao-filme" id="banner-descricao">Acompanhe a saga de um mercenário em uma metrópole obcecada por poder, glamour e modificações corporais.</p>
                <div class="botoes-container">
                    <button class="botao-streamflix botao-play"><i class="fa-solid fa-play"></i>▶ Assistir</button>
                    <button class="botao-streamflix botao-info" onclick="IA.gerarSinopse('Destaque')"><i class="fa-solid fa-wand-magic-sparkles"></i> Detalhes</button>
                </div>
            </div>
        </main>

        <section class="secao-carrossel" id="container-carrosseis"></section>
    </div>
</body>

<script src="js/data.js"></script>
<script src="js/geminiApi.js"></script>
<script src="js/state.js"></script>
<script src="js/app.js"></script>
<script src="js/index.js"></script>

</html>
